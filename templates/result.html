<!DOCTYPE html>
<html>
    <head>
        <!-- Title shown on browser tab -->
         <title>Prediction Result</title>

         <!-- INternal CSS styling-->
         <style>

            /* Page styling */
            body{
                font-family: Arial, sans-serif;
                background-color:#f2f2f2;
                text-align:center;
            }

            /* Result container box */
            .result-box{
                width:400px;
                margin:auto;
                margin-top:100px; /* Space from top */
                background:white;
                padding:30px;
                border-radius:10px;
                box-shadow:0px 0px 10px grey;
            }

            /* Style for price text */
            .price{
                font-size:26px;
                color:#2e8b57;
                font-weight:bold;
            }

            /* Back button styling */
            .button{
                display:inline-block;
                margin-top:20px;
                padding:10px 20px;
                background:#2e8b57;
                color:white;
                text-decoration:none;
                border-radius:5px;
            }

            /* Hover effect */
            .button:hover{
                background:#1e6f46;
            }

         </style> 
    </head>
   
    <body>
       <!-- Result container -->
        <div class="result-box">

            <!-- Heading -->
            <h2>Prediction Result</h2>

            <!-- Display predicted price sent from Flask -->
            <!-- Flask variable appears inside curly brackets -->
            <p class="price">Estimated Car Price: ₹ {{price}}</p>

            <!-- Link to return to home page -->
            <a href="/" class="button">Predict Another Price</a>
        </div> 
    </body>
</html>
